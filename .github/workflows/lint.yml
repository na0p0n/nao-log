name: Lint

on:
  pull_request:
    paths:
      - "src/**"
      - "package*.json"
      - ".textlintrc.json"
      - ".github/workflows/lint.yml"

jobs:
  textlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check
